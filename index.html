<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00b388" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/app-icon-192.png" sizes="192x192" />
    <title>chime</title>
    <style>
      :root {
        color-scheme: light;
      }
      #pwa-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #ecfdf9 0%, #ffffff 55%, #f8fafc 100%);
        z-index: 9999;
      }
      #pwa-splash .splash-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      #pwa-splash .splash-icon {
        width: 140px;
        height: 140px;
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
        overflow: hidden;
        background: #ffffff;
        display: grid;
        place-items: center;
      }
      #pwa-splash .splash-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 28px;
      }
      #pwa-splash .skeleton {
        width: 220px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 37%, #e2e8f0 63%);
        background-size: 400% 100%;
        animation: shimmer 1.2s ease-in-out infinite;
      }
      #pwa-splash .skeleton:nth-child(3) {
        width: 160px;
      }
      @keyframes shimmer {
        0% { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }
    </style>
  </head>

  <body>
    <div id="pwa-splash">
      <div class="splash-card">
        <div class="splash-icon">
          <img src="/assets/app-icon-rounded.png" alt="chime app icon" />
        </div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
